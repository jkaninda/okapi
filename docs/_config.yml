# ---------------------------------------------------------------------------
# Site
# ---------------------------------------------------------------------------
title: Okapi
description: >-
  Okapi is a lightweight, fast, modular HTTP framework for Go with automatic
  request validation and built-in OpenAPI documentation.
url: https://okapi.jkaninda.dev
baseurl: ""
lang: en
logo: /favicon.ico

# ---------------------------------------------------------------------------
# Author & socials
# ---------------------------------------------------------------------------
author:
  name: Jonas Kaninda
  url: https://www.jkaninda.dev
email: me@jkaninda.dev
twitter_username: jonaskaninda
github_username: jkaninda

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
markdown: kramdown
theme: just-the-docs
permalink: pretty
include:
  - robots.txt
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ---------------------------------------------------------------------------
# Theme: just-the-docs
# https://just-the-docs.com/docs/configuration/
# ---------------------------------------------------------------------------
color_scheme: light
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# "Edit this page on GitHub" links at the bottom of each doc page.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: https://github.com/jkaninda/okapi
gh_edit_branch: main
gh_edit_source: docs
gh_edit_view_mode: edit

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
aux_links:
  "GitHub Repository":
    - https://github.com/jkaninda/okapi
aux_links_new_tab: true

nav_external_links:
  - title: GitHub Repository
    url: https://github.com/jkaninda/okapi
  - title: Basic example
    url: https://github.com/jkaninda/okapi-example
  - title: Examples
    url: https://github.com/jkaninda/okapi/tree/main/examples
nav_external_links_new_tab: true

# ---------------------------------------------------------------------------
# Callouts
# ---------------------------------------------------------------------------
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ---------------------------------------------------------------------------
# Footer
# ---------------------------------------------------------------------------
footer_content: >-
  Copyright &copy; 2026 <a target="_blank" href="https://www.jkaninda.dev">Jonas Kaninda</a>.
  Distributed under the <a href="https://github.com/jkaninda/okapi/tree/main/LICENSE">MIT License</a>.<br>
  Something missing, unclear or not working? Open <a href="https://github.com/jkaninda/okapi/issues">an issue</a>.

# ---------------------------------------------------------------------------
# Mermaid diagrams
# ---------------------------------------------------------------------------
mermaid:
  # Pick an available version from https://cdn.jsdelivr.net/npm/mermaid/
  version: "11.12.2"
